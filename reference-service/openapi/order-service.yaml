openapi: 3.0.3
info:
  title: Reference Order Service API
  version: 1.0.0
paths:
  /api/orders/{orderId}/cancel:
    post:
      summary: Cancel an order
      operationId: cancelOrder
      parameters:
        - name: orderId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CancelOrderRequest'
      responses:
        '200':
          description: Order cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CancelOrderResponse'
        '400':
          description: Request validation or body parsing failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: Order not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '409':
          description: Order cannot be cancelled in current status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
components:
  schemas:
    CancelOrderRequest:
      type: object
      required:
        - reason
      properties:
        reason:
          type: string
          minLength: 1
          pattern: '.*\\S.*'
          description: Must contain at least one non-whitespace character.
    CancelOrderResponse:
      type: object
      required:
        - orderId
        - status
        - reason
      properties:
        orderId:
          type: string
        status:
          type: string
        reason:
          type: string
    ApiErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
