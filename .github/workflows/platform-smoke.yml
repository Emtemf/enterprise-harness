name: platform-smoke

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install CodeGraph
        run: npm install -g @colbymchenry/codegraph@0.9.9

      - name: Initialize CodeGraph index
        run: codegraph init

      - name: Bootstrap runtime
        run: node harness/plugin/runtime/cli.mjs bootstrap

      - name: Setup local adapter
        run: node harness/plugin/runtime/cli.mjs setup-local-adapter --write

      - name: Doctor
        run: node harness/plugin/runtime/cli.mjs doctor

      - name: Sync
        run: node harness/plugin/runtime/cli.mjs sync

      - name: Verify
        run: node harness/plugin/runtime/cli.mjs verify

      - name: Upstream check
        run: node harness/plugin/runtime/cli.mjs upstream-check
